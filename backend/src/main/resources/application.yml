server:
  port: 8080

spring:
  application:
    name: hotel-booking-backend
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=false
    username: root
    password: "Nvd123@"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # use update: auto create/update tables from entities (no schema.sql required to run)
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  # Redis not used when RedisAutoConfiguration is excluded in main class
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

jwt:
  # Secret must be at least 32 bytes (256 bits) for HS256. Keep this or longer in production.
  secret: "very-secret-jwt-key-change-in-prod-1234567890"
  expiration-ms: 86400000 # 1 day

cloudinary:
  cloud-name: "your-cloud-name"
  api-key: "your-api-key"
  api-secret: "your-api-secret"

management:
  endpoints:
    web:
      exposure:
        include: health,info
